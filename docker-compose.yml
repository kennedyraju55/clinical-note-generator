# ============================================================
# Docker Compose for Clinical Note Generator
# ============================================================
# MEDICAL DISCLAIMER: This application generates AI-assisted
# clinical note drafts. All output must be reviewed by a physician.
# ============================================================

services:
  clinical-note-generator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - llm-network
    restart: unless-stopped

  api:
    build: .
    command: ["uvicorn", "src.clinical_note_generator.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - llm-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - llm-network
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  llm-network:
    driver: bridge
