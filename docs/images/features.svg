  </defs>
  <rect width="800" height="350" fill="url(#bg3)" rx="12"/>
  <text x="400" y="40" text-anchor="middle" fill="#cdd6f4" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Features Overview</text>
