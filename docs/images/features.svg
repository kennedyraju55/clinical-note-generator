  <text x="145" y="240" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="24">✏️</text>
  <text x="145" y="265" text-anchor="middle" fill="#cdd6f4" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Note Refinement</text>
  <text x="145" y="285" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Iterative improvement</text>
  <text x="145" y="302" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">with physician feedback</text>
  <rect x="285" y="210" width="230" height="110" rx="10" fill="#1e1e2e" stroke="#ef4444" stroke-width="1.5"/>
