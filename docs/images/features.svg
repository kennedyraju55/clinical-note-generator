  <text x="145" y="145" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Complete structured notes</text>
  <text x="145" y="162" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">from encounter descriptions</text>
  <rect x="285" y="70" width="230" height="110" rx="10" fill="#1e1e2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="24">🏥</text>
