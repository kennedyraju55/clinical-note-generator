<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#cdd6f4" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Architecture Overview</text>
  <!-- CLI -->
  <rect x="50" y="60" width="200" height="80" rx="10" fill="#1e1e2e" stroke="#667eea" stroke-width="2"/>
  <text x="150" y="95" text-anchor="middle" fill="#667eea" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🖥️ CLI Interface</text>
  <text x="150" y="120" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Click + Rich</text>
  <!-- Web UI -->
  <rect x="300" y="60" width="200" height="80" rx="10" fill="#1e1e2e" stroke="#2dd4bf" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" fill="#2dd4bf" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🌐 Web UI</text>
  <text x="400" y="120" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Streamlit :8501</text>
  <!-- API -->
  <rect x="550" y="60" width="200" height="80" rx="10" fill="#1e1e2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="95" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🔌 REST API</text>
  <text x="650" y="120" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">FastAPI :8000</text>
  <!-- Core -->
  <rect x="200" y="180" width="400" height="80" rx="10" fill="#1e1e2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="215" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="16" font-weight="bold">📋 Core Engine</text>
  <text x="400" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">SOAP Generation • Section Builder • Note Refinement</text>
  <!-- Ollama -->
  <rect x="200" y="300" width="400" height="80" rx="10" fill="#1e1e2e" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="335" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="16" font-weight="bold">🤖 Ollama (Gemma 4)</text>
  <text x="400" y="360" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Local LLM • Port 11434 • 100% Private</text>
  <!-- Arrows -->
  <line x1="150" y1="140" x2="300" y2="180" stroke="#45475a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#45475a" stroke-width="2"/>
  <line x1="650" y1="140" x2="500" y2="180" stroke="#45475a" stroke-width="2"/>
  <line x1="400" y1="260" x2="400" y2="300" stroke="#45475a" stroke-width="2"/>
</svg>
