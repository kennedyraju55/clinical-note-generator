# Clinical Note Generator Configuration
model: "gemma4"
temperature: 0.3
max_tokens: 2048
log_level: "INFO"
ollama_url: "http://localhost:11434"

# Note generation settings
note:
  include_icd_codes: true
  include_disclaimer: true
  default_specialty: "internal_medicine"

# UI Settings
ui:
  theme: "medical"
  show_disclaimer: true
